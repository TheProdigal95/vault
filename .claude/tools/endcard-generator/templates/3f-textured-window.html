<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      /* {{BASE_CSS}} */

      /* 3F: Textured background + floating video window with glow */
      .content {
        padding-top: 55px;
      }
      .headline {
        font-size: 100px;
        font-weight: 400;
        line-height: 1.0;
        text-transform: none;
        margin-bottom: 36px;
      }
      .subhead {
        margin-bottom: 48px;
      }
      .pill {
        margin-bottom: 48px;
      }
      .photo-wrapper {
        box-shadow: 0 0 40px rgba(255,255,255,0.08);
        margin-bottom: 40px;
      }
      .badges {
        margin-bottom: 40px;
      }
      .cta {
        padding: 48px 0;
        margin-bottom: 40px;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="15" data-width="1080" data-height="1920">
      <!-- BG_IMAGE -->
      <div class="content">
        <!-- LOGO_TOP -->
        <!-- CAPSULE -->
        <div class="headline" id="headline">{{HEADLINE}}</div>
        <!-- SUBHEAD -->
        <div class="photo-wrapper" id="photo-wrapper">
          {{BROLL_VIDEOS}}
        </div>
        <div class="badges" id="badges-row">
          {{BADGES}}
        </div>
        <div class="cta" id="cta"><span class="cta-text">{{CTA}}</span></div>
        <!-- DISCLAIMER -->
        <!-- FOOTNOTE -->
        <!-- LOGO_BOTTOM -->
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      {{ENTRANCE_GSAP}}

      {{BROLL_MONTAGE_GSAP}}

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
