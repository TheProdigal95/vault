<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      /* {{BASE_CSS}} */

      /* 3C: Full-bleed hero background, content bottom-aligned */
      .hero-bg {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        object-fit: cover;
      }
      .content {
        justify-content: flex-end;
        padding: 0 76px 40px;
      }
      .headline {
        color: #FFFFFF;
        text-shadow: 0 2px 12px rgba(0,0,0,0.5);
      }
      .subhead {
        color: rgba(255,255,255,0.9);
        text-shadow: 0 2px 8px rgba(0,0,0,0.4);
      }
      .badge {
        border-color: rgba(255,255,255,0.4);
        border-radius: 40px;
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(8px);
        box-shadow: none;
      }
      .badge-title {
        color: #FFFFFF;
        text-shadow: 0 1px 4px rgba(0,0,0,0.3);
      }
      .cta {
        background: #FFFFFF;
      }
      .cta-text {
        color: var(--bg);
      }
      .disclaimer {
        border-color: rgba(255,255,255,0.3);
      }
      .disclaimer-text {
        color: rgba(255,255,255,0.7);
      }
      .footnote {
        color: rgba(255,255,255,0.7);
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="15" data-width="1080" data-height="1920">
      <img class="hero-bg" id="hero-img" src="hero.png" alt="" />
      <div class="content">
        <!-- LOGO_TOP -->
        <!-- CAPSULE -->
        <div class="headline" id="headline">{{HEADLINE}}</div>
        <!-- SUBHEAD -->
        <div class="badges" id="badges-row">
          {{BADGES}}
        </div>
        <div class="cta" id="cta"><span class="cta-text">{{CTA}}</span></div>
        <!-- DISCLAIMER -->
        <!-- FOOTNOTE -->
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      {{ENTRANCE_GSAP}}

      {{BROLL_MONTAGE_GSAP}}

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
