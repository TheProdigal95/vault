<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      /* {{BASE_CSS}} */

      /* 3G: Textured background + seal or list hero */
      .content {
        padding: 80px 76px 60px;
      }
      .headline {
        margin-bottom: 36px;
      }
      .subhead {
        margin-bottom: 48px;
      }
      .pill {
        margin-bottom: 36px;
      }
      .seal {
        width: 640px;
        height: 640px;
        border-radius: 50%;
        background: #fff;
        border: 3px solid var(--border-color);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        margin-bottom: 60px;
      }
      .seal-number {
        font-family: "Arizona Flare", serif;
        font-size: 280px;
        font-weight: 700;
        color: var(--bg);
        line-height: 0.85;
      }
      .seal-text {
        font-family: "Manrope", sans-serif;
        font-size: 48px;
        font-weight: 800;
        color: var(--bg);
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-top: -5px;
      }
      .list-hero {
        display: flex;
        flex-direction: column;
        gap: 20px;
        width: 928px;
        flex: 1 1 0%;
        min-height: 0;
        justify-content: center;
        margin-bottom: 40px;
      }
      .list-item {
        display: flex;
        align-items: center;
        padding: 24px 36px;
        border: 2px solid var(--border-color);
        border-radius: 16px;
        background: rgba(255,255,255,0.05);
      }
      .list-text {
        font-family: "Manrope", sans-serif;
        font-size: 36px;
        font-weight: 700;
        color: var(--text-primary);
        text-transform: uppercase;
      }
      .badges {
        margin-bottom: 40px;
      }
      .badge {
        padding: 18px 12px;
      }
      .cta {
        padding: 48px 0;
        margin-bottom: 40px;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="15" data-width="1080" data-height="1920">
      <!-- BG_IMAGE -->
      <div class="content">
        <!-- LOGO_TOP -->
        <!-- CAPSULE -->
        <div class="headline" id="headline">{{HEADLINE}}</div>
        <!-- SUBHEAD -->
        {{HERO_SECTION}}
        <div class="badges" id="badges-row">
          {{BADGES}}
        </div>
        <div class="cta" id="cta"><span class="cta-text">{{CTA}}</span></div>
        <!-- DISCLAIMER -->
        <!-- FOOTNOTE -->
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      {{ENTRANCE_GSAP}}

      {{BROLL_MONTAGE_GSAP}}

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
