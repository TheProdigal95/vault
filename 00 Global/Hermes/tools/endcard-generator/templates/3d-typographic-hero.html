<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      /* {{BASE_CSS}} */

      /* 3D: Centered layout, stat number is the hero */
      .content {
        justify-content: center;
        padding: 80px 76px 60px;
      }
      .headline {
        font-size: 72px;
        line-height: 1.1;
        margin-bottom: 40px;
      }
      .pill {
        margin-bottom: 48px;
      }
      .stat-hero {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        flex: 1 1 0%;
        min-height: 0;
        width: 100%;
      }
      .stat-number {
        font-family: "Arizona Flare", serif;
        font-size: 310px;
        font-weight: 700;
        color: var(--text-primary);
        line-height: 0.85;
        text-shadow: var(--text-shadow);
      }
      .stat-label {
        font-family: "Manrope", sans-serif;
        font-size: 48px;
        font-weight: 800;
        color: var(--text-secondary);
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-top: 8px;
        text-shadow: var(--text-shadow);
      }
      .badges {
        margin-bottom: 40px;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="15" data-width="1080" data-height="1920">
      <!-- BG_IMAGE -->
      <div class="content">
        <!-- LOGO_TOP -->
        <!-- CAPSULE -->
        <div class="headline" id="headline">{{HEADLINE}}</div>
        <!-- SUBHEAD -->
        <div class="stat-hero">
          <span class="stat-number" id="stat-number">{{STAT_NUMBER}}</span>
          <span class="stat-label" id="stat-label">{{STAT_LABEL}}</span>
        </div>
        <div class="badges" id="badges-row">
          {{BADGES}}
        </div>
        <div class="cta" id="cta"><span class="cta-text">{{CTA}}</span></div>
        <!-- DISCLAIMER -->
        <!-- FOOTNOTE -->
        <!-- LOGO_BOTTOM -->
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      {{ENTRANCE_GSAP}}

      {{BROLL_MONTAGE_GSAP}}

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
