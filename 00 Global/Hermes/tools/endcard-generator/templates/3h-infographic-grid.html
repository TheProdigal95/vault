<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      /* {{BASE_CSS}} */

      /* 3H: Infographic grid hero */
      .content {
        padding: 60px 76px 40px;
      }
      .headline {
        font-size: 80px;
        margin-bottom: 36px;
      }
      .subhead {
        font-size: 42px;
        margin-bottom: 36px;
      }
      .grid-hero {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        width: 928px;
        flex: 1 1 0%;
        min-height: 0;
        margin-bottom: 36px;
      }
      .grid-cell {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 28px 20px;
        border: 2px solid var(--badge-border);
        border-radius: 20px;
        background: var(--badge-bg);
        box-shadow: var(--badge-shadow);
      }
      .grid-cell-text {
        font-family: "Manrope", sans-serif;
        font-size: 34px;
        font-weight: 800;
        color: var(--badge-text);
        text-transform: uppercase;
        text-align: center;
        line-height: 1.2;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="15" data-width="1080" data-height="1920">
      <!-- BG_IMAGE -->
      <div class="content">
        <!-- LOGO_TOP -->
        <!-- CAPSULE -->
        <div class="headline" id="headline">{{HEADLINE}}</div>
        <!-- SUBHEAD -->
        <div class="grid-hero" id="grid-hero">
          {{GRID_CELLS}}
        </div>
        <div class="badges" id="badges-row">
          {{BADGES}}
        </div>
        <div class="cta" id="cta"><span class="cta-text">{{CTA}}</span></div>
        <!-- DISCLAIMER -->
        <!-- FOOTNOTE -->
        <!-- LOGO_BOTTOM -->
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      {{ENTRANCE_GSAP}}

      {{BROLL_MONTAGE_GSAP}}

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
