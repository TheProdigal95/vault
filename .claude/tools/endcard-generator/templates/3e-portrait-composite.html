<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      /* {{BASE_CSS}} */

      /* 3E: Portrait composite — bottom-aligned, hero blended into texture */
      .hero-composite {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        object-fit: cover;
        mix-blend-mode: luminosity;
        opacity: 0.7;
      }
      .content {
        justify-content: flex-end;
        padding: 0 76px 60px;
      }
      .headline {
        font-weight: 400;
      }
      .subhead {
        margin-bottom: 40px;
      }
      .badges {
        margin-bottom: 36px;
      }
      .badge {
        padding: 18px 12px;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="15" data-width="1080" data-height="1920">
      <!-- BG_IMAGE -->
      <img class="hero-composite" id="hero-img" src="hero.png" alt="" />
      <div class="content">
        <!-- LOGO_TOP -->
        <!-- CAPSULE -->
        <div class="headline" id="headline">{{HEADLINE}}</div>
        <!-- SUBHEAD -->
        <div class="badges" id="badges-row">
          {{BADGES}}
        </div>
        <div class="cta" id="cta"><span class="cta-text">{{CTA}}</span></div>
        <!-- DISCLAIMER -->
        <!-- FOOTNOTE -->
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      {{ENTRANCE_GSAP}}

      {{BROLL_MONTAGE_GSAP}}

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
